<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>愚人节愿望</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif}
body{
  background: linear-gradient(135deg, #ffe6f0, #ffd1e0);
  min-height:100vh;
  padding:30px 20px;
  text-align:center;
  overflow-x: hidden;
}
.title{
  font-size:28px;
  color:#c8507c;
  margin-bottom:30px;
  position: relative;
  z-index:10;
  font-weight: bold;
}
.wrap{
  position: relative;
  width:100%;
  height: 80vh;
  max-width: 500px;
  margin: 0 auto;
}

/* 浪漫气泡 + 持续浮动 */
.item{
  position: absolute;
  background:rgba(255,255,255,0.9);
  padding: 24px 20px;
  border-radius:50%;
  box-shadow: 0 8px 24px rgba(255,66,156,0.15);
  font-size:16px;
  cursor:pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  white-space: nowrap;
  animation: float 4s ease-in-out infinite alternate;
  z-index:2;
  border: 1px solid rgba(255,183,211,0.4);
}
@keyframes float {
  from { transform: translateY(0px); }
  to   { transform: translateY(-18px); }
}

.special{
  background: linear-gradient(135deg, #ff7eb9, #ff5c96);
  color:#fff;
  font-weight:bold;
  border: 2px solid #ffb6c1;
  z-index:1;
}

.tip{
  margin-top:20px;
  color:#b86b8d;
  font-size:15px;
  position: relative;
  z-index:10;
}
.mask{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(255,156,192,0.3);
  display:none;
  z-index:999;
}
.pop{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:36px;
  border-radius:20px;
  display:none;
  min-width:280px;
  z-index:1000;
  box-shadow: 0 12px 36px rgba(0,0,0,0.2);
}
.pop h3{
  color:#ff5c96;
  margin-bottom:15px;
  font-size:22px;
}
.pop p{
  color:#666;
  line-height:1.6;
}
</style>
</head>
<body>

<div class="title">愚人节·愿望成真</div>
<div class="wrap">
  <div class="item normal" style="top:10px; left:10px">暴富一百万</div>
  <div class="item normal" style="top:90px; left:190px">吃不胖还变瘦</div>
  <div class="item normal" style="top:20px; left:320px">每天睡到自然醒</div>
  <div class="item normal" style="top:200px; left:30px">永远开心不生气</div>
  <div class="item normal" style="top:260px; left:240px">想要最新的手机</div>
  <div class="item special" style="top:140px; left:110px">亲男朋友一下</div>
</div>
<div class="tip">点击任意愿望，试试能不能实现～</div>

<div class="mask" id="mask"></div>
<div class="pop" id="pop">
  <h3>🎉 愿望实现啦</h3>
  <p>已复制：我爱你</p>
  <p>快去聊天框粘贴吧～</p>
</div>

<script>
let scaleNormal = 1;
let scaleSpecial = 1;

document.querySelectorAll('.normal').forEach(i=>{
  i.onclick=()=>{
    alert("你选择了："+i.innerText+"\n好像有点难实现哦…");

    // 每次缩小幅度更大，并且可以一直变小
    scaleNormal = Math.max(0.01, scaleNormal * 0.6);
    document.querySelectorAll('.normal').forEach(n=>{
      n.style.transform = `scale(${scaleNormal})`;
      n.style.opacity = scaleNormal + 0.2;
    });

    // 特殊愿望大幅变大，越来越夸张，直到撑满全屏
    scaleSpecial *= 1.8;
    let sp = document.querySelector('.special');
    sp.style.transform = `scale(${scaleSpecial})`;
    sp.style.zIndex = 99;
  }
})

document.querySelector('.special').onclick=()=>{
  alert("你选择了：亲男朋友一下\n恭喜！这个愿望可以实现～");
  document.getElementById('mask').style.display='block';
  document.getElementById('pop').style.display='block';

  let t=document.createElement('textarea');
  t.value='我爱你';
  document.body.appendChild(t);
  t.select();
  document.execCommand('copy');
  document.body.removeChild(t);
}
</script>
</body>
</html>
