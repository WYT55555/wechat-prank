<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>愚人节愿望</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#fce4ec;padding:30px 20px;text-align:center}
.title{font-size:26px;color:#d81b60;margin-bottom:30px}
.wrap{max-width:500px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.item{background:#fff;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);font-size:17px;cursor:pointer;transition:all 0.3s}
.special{background:#ff5a95;color:#fff;font-weight:bold;border:2px solid #ffd600}
.tip{margin-top:20px;color:#666;font-size:14px}
.mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none}
.pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border-radius:16px;display:none;min-width:280px}
.pop h3{color:#d81b60;margin-bottom:15px}
</style>
</head>
<body>

<div class="title">愚人节·愿望成真</div>
<div class="wrap">
  <div class="item normal">暴富一百万</div>
  <div class="item normal">吃不胖还变瘦</div>
  <div class="item normal">每天睡到自然醒</div>
  <div class="item normal">永远开心不生气</div>
  <div class="item normal">想要最新的手机</div>
  <div class="item special">亲男朋友一下</div>
</div>
<div class="tip">点击任意愿望，试试能不能实现～</div>

<div class="mask" id="mask"></div>
<div class="pop" id="pop">
  <h3>🎉 愿望实现啦</h3>
  <p>已复制：我爱你</p>
  <p>直接粘贴发聊天即可</p>
</div>

<script>
let s = 1;
document.querySelectorAll('.normal').forEach(i=>{
  i.onclick=()=>{
    alert("你选择了："+i.innerText+"\n好像有点难实现哦…");
    s = Math.max(0.2, s - 0.12);
    document.querySelectorAll('.normal').forEach(n=>{
      n.style.transform=`scale(${s})`;
      n.style.opacity=s;
    });
    let sp=document.querySelector('.special');
    sp.style.transform=`scale(${1+(1-s)*0.7})`;
  }
})

document.querySelector('.special').onclick=()=>{
  alert("你选择了：亲男朋友一下\n恭喜！这个愿望可以实现～");
  document.getElementById('mask').style.display='block';
  document.getElementById('pop').style.display='block';
  let t=document.createElement('textarea');
  t.value='我爱你';
  document.body.appendChild(t);
  t.select();
  document.execCommand('copy');
  document.body.removeChild(t);
}
</script>
</body>
</html>
