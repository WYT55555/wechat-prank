<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愚人节惊喜</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;}
        body{background:linear-gradient(135deg,#ff6b9d,#ff8fab,#ffb6c1);min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;}
        .container{background:rgba(255,255,255,.98);border-radius:20px;padding:30px 25px;width:90%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);}
        .title{font-size:24px;color:#ff4081;margin-bottom:15px;}
        .subtitle{font-size:16px;color:#666;margin-bottom:25px;line-height:1.5;}
        .options{display:flex;flex-direction:column;gap:12px;}
        .btn{padding:18px;border-radius:12px;font-size:17px;border:none;cursor:pointer;}
        .btn-wrong{background:#f8f9fa;color:#666;border:2px solid #e9ecef;}
        .btn-correct{background:linear-gradient(135deg,#ff4081,#ff6b9d);color:white;}
        .error{background:rgba(244,67,54,.9);color:white;padding:12px;border-radius:10px;margin-top:15px;display:none;}
        .success{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#ff6b9d,#ff8fab,#ffb6c1);display:none;justify-content:center;align-items:center;}
        .success-box{background:white;border-radius:20px;padding:40px 30px;text-align:center;}
        .close-btn{background:linear-gradient(135deg,#4CAF50,#66BB6A);color:white;padding:16px 40px;border:none;border-radius:25px;margin-top:20px;cursor:pointer;}
    </style>
</head>
<body>

<div class="container" id="main">
    <div class="title">🎭 愚人节特别挑战 🎭</div>
    <div class="subtitle">亲爱的，你点开了这个链接！<br>现在你必须完成挑战才能退出...</div>
    <div class="options">
        <button class="btn btn-wrong" id="w1">❌ 点这里退出</button>
        <button class="btn btn-wrong" id="w2">❌ 拒绝挑战</button>
        <button class="btn btn-wrong" id="w3">❌ 我不是你宝贝</button>
        <button class="btn btn-correct" id="ok">💋 亲男朋友一口</button>
    </div>
    <div class="error" id="err"></div>
</div>

<div class="success" id="success">
    <div class="success-box">
        <h2>🎉 挑战成功！ 🎉</h2>
        <p>你选择了"亲男朋友一口"！<br>已自动发送我爱你</p>
        <div style="font-size:24px;color:#ff4081;margin:20px 0;">我爱你 💕</div>
        <button class="close-btn" id="close">退出页面</button>
    </div>
</div>

<script>
const KEY = "FOOL_CLOSE_PERMIT";
const URL = location.href.replace(/#.*$/,'');

// 允许关闭标记
let PERMIT = false;

// 读取本地状态
if(localStorage.getItem(KEY) === "1"){
    PERMIT = true;
    localStorage.removeItem(KEY);
}

// 复活机制：用户点×关闭后，页面自动重新打开
if(localStorage.getItem(KEY) === "0"){
    localStorage.removeItem(KEY);
    setTimeout(()=>location.replace(URL), 80);
}

// 拦截返回
history.pushState({},'',URL);
window.onpopstate = ()=>{
    if(!PERMIT){
        history.pushState({},'',URL);
        showErr("禁止返回！");
    }
};

// 关闭前标记复活
window.onbeforeunload = ()=>{
    if(!PERMIT){
        localStorage.setItem(KEY,"0");
        return "不许退出！";
    }
};

// 错误按钮
document.getElementById("w1").onclick=()=>showErr("想得美！不亲我出不去~");
document.getElementById("w2").onclick=()=>showErr("拒绝无效！必须亲我~");
document.getElementById("w3").onclick=()=>showErr("你就是我宝贝，跑不掉~");

// 正确按钮：允许关闭
document.getElementById("ok").onclick=()=>{
    PERMIT = true;
    localStorage.setItem(KEY,"1");
    document.getElementById("main").style.display="none";
    document.getElementById("success").style.display="flex";
};

// 真正关闭
document.getElementById("close").onclick=()=>{
    localStorage.removeItem(KEY);
    if(window.WeixinJSBridge) WeixinJSBridge.invoke('closeWindow');
    else window.close();
};

function showErr(msg){
    const e=document.getElementById("err");
    e.textContent=msg;
    e.style.display="block";
    setTimeout(()=>e.style.display="none",2000);
}
</script>
</body>
</html>
