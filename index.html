<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愚人节快乐</title>
<style>
  body{
    background:#ff4444;
    color:white;
    text-align:center;
    padding-top:40vh;
    font-size:22px;
    user-select:none;
  }
</style>

<body>

愚人节快乐～
<br>
你退不出去的哦 😈

<script>
// 1. 拦截安卓物理返回键 & 浏览器返回
history.pushState(null, document.title, location.href);
window.addEventListener('popstate', function () {
  history.pushState(null, document.title, location.href);
});

// 2. 拦截关闭/刷新提示
window.onbeforeunload = function() {
  return "确定要离开吗？";
};

// 3. 疯狂自动刷新/原地停留（恶心人效果）
setInterval(function(){
  window.scrollTo(0,0);
}, 100);

</script>
</body>
</html>
