<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愚人节惊喜</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 30%, #ffb6c1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        
        .title {
            font-size: 24px;
            color: #ff4081;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            padding: 18px;
            border-radius: 12px;
            font-size: 17px;
            border: none;
            cursor: pointer;
        }
        
        .btn-wrong {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e9ecef;
        }
        
        .btn-correct {
            background: linear-gradient(135deg, #ff4081, #ff6b9d);
            color: white;
        }
        
        .error {
            background: rgba(244, 67, 54, 0.9);
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        
        .success {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff6b9d, #ff8fab, #ffb6c1);
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .success-box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        
        .close-btn {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 25px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- 主界面 -->
    <div class="container" id="main">
        <div class="title">🎭 愚人节特别挑战 🎭</div>
        <div class="subtitle">
            亲爱的，你点开了这个链接！<br>
            现在你必须完成挑战才能退出...
        </div>
        <div class="options">
            <button class="btn btn-wrong" id="wrong1">❌ 点这里退出</button>
            <button class="btn btn-wrong" id="wrong2">❌ 拒绝挑战</button>
            <button class="btn btn-wrong" id="wrong3">❌ 我不是你宝贝</button>
            <button class="btn btn-correct" id="correct">💋 亲男朋友一口</button>
        </div>
        <div class="error" id="error"></div>
    </div>

    <!-- 成功界面 -->
    <div class="success" id="success">
        <div class="success-box">
            <h2>🎉 挑战成功！ 🎉</h2>
            <p>你选择了"亲男朋友一口"！<br>已自动发送我爱你</p>
            <div style="font-size:24px; color:#ff4081; margin:20px 0;">我爱你 💕</div>
            <button class="close-btn" id="closeBtn">退出页面</button>
        </div>
    </div>

<script>
// ==============================================
// 【正宗】全网通用 · 微信返回劫持（鬼打墙）
// 严格按照你说的原理实现：pushState + popstate
// ==============================================
let canExit = false;

// 1. 页面加载 → 立刻塞一条历史记录
history.pushState(null, null, location.href);

// 2. 监听返回键 → 再次塞记录 → 无限循环（鬼打墙）
window.addEventListener('popstate', function () {
    if (!canExit) {
        history.pushState(null, null, location.href);
        showError("哈哈哈，你退不出去的！");
    }
});

// ==================== 按钮逻辑 ====================
document.getElementById('wrong1').onclick = () => showError("想得美！不亲我出不去~");
document.getElementById('wrong2').onclick = () => showError("拒绝无效！必须亲我~");
document.getElementById('wrong3').onclick = () => showError("你就是我宝贝，跑不掉~");

// 选对 → 解除劫持，可以退出
document.getElementById('correct').onclick = function () {
    canExit = true;
    document.getElementById('main').style.display = 'none';
    document.getElementById('success').style.display = 'flex';
};

// 退出按钮
document.getElementById('closeBtn').onclick = function () {
    if (window.WeixinJSBridge) WeixinJSBridge.invoke('closeWindow');
    else window.close();
};

// 错误提示
function showError(msg) {
    let err = document.getElementById('error');
    err.textContent = msg;
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2000);
}
</script>
</body>
</html>
