<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,user-scalable=no">
    <title>欠款通知</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            animation: shake 0.1s infinite alternate;
        }
        @keyframes shake {
            0% { transform: translate(0,0); }
            100% { transform: translate(-2px, 2px); }
        }
        .container {
            max-width: 450px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .wechat-logo {
            text-align: center;
            margin: 20px 0;
        }
        .wechat-logo svg {
            width: 60px;
            fill: #fa5151;
        }
        .title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #fa5151;
            margin-bottom: 30px;
        }
        .content {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .warn {
            color: #fa5151;
            font-weight: bold;
            font-size: 18px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #fa5151;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 16px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wechat-logo">
            <svg t="1712254020453" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="2312" width="128" height="128"><path d="M725.333333 256C573.866667 256 452.266667 348.16 452.266667 460.8c0 112.64 121.6 204.8 273.066666 204.8 34.133333 0 66.133333-4.266667 94.933334-12.8l132.266666 40.533333-29.866666-119.466666c21.333333-27.733333 32-61.866667 32-98.133334 0-112.64-121.6-204.8-273.066667-204.8zM298.666667 512c-27.733333 0-53.333333-10.666667-74.666667-29.866667-21.333333-19.2-32-43.733333-32-70.4 0-26.666667 10.666667-51.2 32-70.4 21.333333-19.2 46.933333-29.866667 74.666667-29.866667 27.733333 0 53.333333 10.666667 74.666667 29.866667 21.333333 19.2 32 43.733333 32 70.4 0 26.666667-10.666667 51.2-32 70.4-21.333333 19.2-46.933333 29.866667-74.666667 29.866667z m192 0c-27.733333 0-53.333333-10.666667-74.666667-29.866667-21.333333-19.2-32-43.733333-32-70.4 0-26.666667 10.666667-51.2 32-70.4 21.333333-19.2 46.933333-29.866667 74.666667-29.866667 27.733333 0 53.333333 10.666667 74.666667 29.866667 21.333333 19.2 32 43.733333 32 70.4 0 26.666667-10.666667 51.2-32 70.4-21.333333 19.2-46.933333 29.866667-74.666667 29.866667z m192 0c-27.733333 0-53.333333-10.666667-74.666667-29.866667-21.333333-19.2-32-43.733333-32-70.4 0-26.666667 10.666667-51.2 32-70.4 21.333333-19.2 46.933333-29.866667 74.666667-29.866667 27.733333 0 53.333333 10.666667 74.666667 29.866667 21.333333 19.2 32 43.733333 32 70.4 0 26.666667-10.666667 51.2-32 70.4-21.333333 19.2-46.933333 29.866667-74.666667 29.866667z" p-id="2313"></path></svg>
        </div>
        <div class="title">欠款提醒通知</div>
        <div class="content">
            你<span class="warn">欠小玲人民币一百万元</span><br>
            已到还款期限，请立即处理！<br><br>
            逾期未还将承担全部法律责任！
        </div>
        <button class="btn" onclick="startPrank()">立即还款</button>
    </div>

    <script>
        function startPrank() {
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 200]);
            }
            
            function prankAlert() {
                alert("⚠️ 还款失败！\n你欠小玲的100万元必须尽快归还！\n\n【愚人节快乐！】");
                setTimeout(prankAlert, 100);
            }
            
            window.onbeforeunload = function() {
                return "请勿关闭，正在记录欠款信息！";
            };
            
            prankAlert();
        }
    </script>
</body>
</html>
