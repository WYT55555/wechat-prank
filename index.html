<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愚人节惊喜</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 30%, #ffb6c1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }
        
        .container {
            background-color: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 30px 25px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            animation: popIn 0.6s ease-out;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        .title {
            font-size: 24px;
            color: #ff4081;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .title-icon {
            font-size: 28px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .option-button {
            padding: 18px 20px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .option-button:active {
            transform: scale(0.97);
        }
        
        .option-wrong {
            background-color: #f8f9fa;
            color: #666;
            border: 2px solid #e9ecef;
        }
        
        .option-wrong:hover {
            background-color: #e9ecef;
        }
        
        .option-correct {
            background: linear-gradient(135deg, #ff4081, #ff6b9d);
            color: white;
            border: 2px solid #ff4081;
        }
        
        .option-correct:hover {
            background: linear-gradient(135deg, #f50057, #ff4081);
        }
        
        .option-icon {
            font-size: 20px;
        }
        
        .error-message {
            background-color: rgba(244, 67, 54, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 15px;
            margin-top: 15px;
            display: none;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .success-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 30%, #ffb6c1 100%);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 2000;
            padding: 20px;
        }
        
        .success-content {
            background-color: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            animation: successPop 0.8s ease-out;
        }
        
        @keyframes successPop {
            0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .success-title {
            font-size: 28px;
            color: #ff4081;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .success-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .love-message-container {
            background: linear-gradient(135deg, #ff4081, #ff6b9d);
            color: white;
            padding: 25px 20px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            margin: 25px 0;
            animation: pulse 2s infinite;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 5px 20px rgba(255, 64, 129, 0.3); }
            50% { transform: scale(1.03); box-shadow: 0 8px 25px rgba(255, 64, 129, 0.5); }
            100% { transform: scale(1); box-shadow: 0 5px 20px rgba(255, 64, 129, 0.3); }
        }
        
        .close-button {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 25px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 200px;
        }
        
        .close-button:active {
            transform: scale(0.95);
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            .title {
                font-size: 22px;
            }
            .option-button {
                padding: 16px 20px;
                font-size: 16px;
            }
            .success-content {
                padding: 30px 20px;
            }
            .success-title {
                font-size: 24px;
            }
            .love-message-container {
                font-size: 22px;
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="title">
        <span class="title-icon">🎭</span>
        <span>愚人节特别挑战</span>
        <span class="title-icon">🎭</span>
    </div>
    
    <div class="subtitle">
        亲爱的，你点开了这个链接！<br>
        现在你必须完成挑战才能退出...
    </div>
    
    <div class="options-container">
        <button class="option-button option-wrong" id="wrong1">
            <span class="option-icon">❌</span>
            <span>点这里退出</span>
        </button>
        
        <button class="option-button option-wrong" id="wrong2">
            <span class="option-icon">❌</span>
            <span>拒绝挑战</span>
        </button>
        
        <button class="option-button option-wrong" id="wrong3">
            <span class="option-icon">❌</span>
            <span>我不是你宝贝</span>
        </button>
        
        <button class="option-button option-correct" id="correct">
            <span class="option-icon">💋</span>
            <span>亲男朋友一口</span>
        </button>
    </div>
    
    <div class="error-message" id="error-message">
        错误选择！请选择"亲男朋友一口"才能退出！
    </div>
</div>

<div class="success-container" id="success-container">
    <div class="success-content">
        <div class="success-title">
            <span>🎉</span>
            <span>挑战成功！</span>
            <span>🎉</span>
        </div>
        
        <div class="success-message">
            你选择了"亲男朋友一口"！<br>
            已经自动发送"我爱你"消息
        </div>
        
        <div class="love-message-container" id="love-message">
            我爱你 💕
        </div>
        
        <button class="close-button" id="close-button">
            退出页面
        </button>
    </div>
</div>

<script>
let canClose = false;

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('wrong1').addEventListener('click', () => handleWrongOption(1));
    document.getElementById('wrong2').addEventListener('click', () => handleWrongOption(2));
    document.getElementById('wrong3').addEventListener('click', () => handleWrongOption(3));
    document.getElementById('correct').addEventListener('click', handleCorrectOption);
    document.getElementById('close-button').addEventListener('click', () => {
        canClose = true;
        alert("愚人节快乐！可以关闭页面啦～");
        window.close();
    });
});

function handleWrongOption(optionNum) {
    const errorMessages = [
        "想得美！不亲我是出不去的~",
        "拒绝无效！今天必须亲我~",
        "不承认也没用，你就是我宝贝！"
    ];
    showError(errorMessages[optionNum - 1]);
    
    const container = document.getElementById('main-container');
    container.style.animation = 'none';
    setTimeout(() => container.style.animation = 'popIn 0.6s ease-out', 10);
}

function handleCorrectOption() {
    document.getElementById('main-container').style.display = 'none';
    document.getElementById('success-container').style.display = 'flex';
    showLoveMessage();
    canClose = true;
}

function showError(message) {
    const el = document.getElementById('error-message');
    el.textContent = message;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2000);
}

function showLoveMessage() {
    const el = document.getElementById('love-message');
    let count = 0;
    const anim = setInterval(() => {
        el.textContent = `正在发送我爱你消息${'.'.repeat(count % 4)}`;
        if (count++ === 8) {
            clearInterval(anim);
            el.innerHTML = "我爱你 💕<br><small>消息已发送成功！</small>";
        }
    }, 300);
}

// 强制禁止关闭/返回/刷新，只有选对了才放行
window.onbeforeunload = (e) => {
    if (!canClose) {
        e.preventDefault();
        return "必须完成挑战才能离开哦～";
    }
};

history.pushState(null, null, location.href);
window.onpopstate = () => {
    if (!canClose) history.go(1);
};

document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'r' || e.key === 'F5') {
        if (!canClose) e.preventDefault();
    }
});

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
