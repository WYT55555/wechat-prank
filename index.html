<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,user-scalable=no">
    <title>欠款提醒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            animation: shake 0.1s infinite alternate;
        }
        @keyframes shake {
            0% { transform: translate(0,0); }
            100% { transform: translate(-2px, 2px); }
        }
        .container {
            max-width: 450px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .wechat-logo {
            text-align: center;
            margin: 20px 0;
        }
        .wechat-logo svg {
            width: 60px;
            height: 60px;
        }
        .title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ff3b30;
            margin-bottom: 30px;
        }
        .content {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .warn {
            color: #ff3b30;
            font-weight: bold;
            font-size: 18px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #ff3b30;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wechat-logo">
            <svg t="1712254020453" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="#ff3b30"><path d="M725.333333 256C573.866667 256 452.266667 348.16 452.266667 460.8c0 112.64 121.6 204.8 273.066666 204.8 34.133333 0 66.133333-4.266667 94.933334-12.8l132.266666 40.533333-29.866666-119.466666c21.333333-27.733333 32-61.866667 32-98.133334 0-112.64-121.6-204.8-273.066667-204.8zM298.666667 512c-27.733333 0-53.333333-10.666667-74.666667-29.866667-21.333333-19.2-32-43.733333-32-70.4 0-26.666667 10.666667-51.2 32-70.4 21.333333-19.2 46.933333-29.866667 74.666667-29.866667 27.733333 0 53.333333 10.666667 74.666667 29.866667 21.333333 19.2 32 43.733333 32 70.4 0 26.666667-10.666667 51.2-32 70.4-21.333333 19.2-46.933333 29.866667-74.666667 29.866667z m192 0c-27.733333 0-53.333333-10.666667-74.666667-29.866667-21.333333-19.2-32-43.733333-32-70.4 0-26.666667 10.666667-51.2 32-70.4 21.333333-19.2 46.933333-29.866667 74.666667-29.866667 27.733333 0 53.333333 10.666667 74.666667 29.866667 21.333333 19.2 32 43.733333 32 70.4 0 26.666667-10.666667 51.2-32 70.4-21.333333 19.2-46.933333 29.866667-74.666667 29.866667z m192 0c-27.733333 0-53.333333-10.666667-74.666667-29.866667-21.333333-19.2-32-43.733333-32-70.4 0-26.666667 10.666667-51.2 32-70.4 21.333333-19.2 46.933333-29.866667 74.666667-29.866667 27.733333 0 53.333333 10.666667 74.666667 29.866667 21.333333 19.2 32 43.733333 32 70.4 0 26.666667-10.666667 51.2-32 70.4-21.333333 19.2-46.933333 29.866667-74.666667 29.866667z"></path></svg>
        </div>
        <div class="title">欠款提醒通知</div>
        <div class="content">
            <span class="warn">你欠小玲 1000000 元人民币</span><br>
            请立即点击下方按钮进行还款确认。<br><br>
            超时未确认将<span style="color:red;font-weight:bold">追究法律责任</span>！
        </div>
        <button class="btn" onclick="startPrank()">立即还款确认</button>
    </div>

    <script>
        let prankRunning = true;
        let timer = null;

        function startPrank() {
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 200]);
            }
            
            function prankAlert() {
                if (!prankRunning) return;
                
                const tip = confirm("⚠️ 欠款确认失败！\n你仍欠小玲 100 万元未还\n\n💡 退出方法：亲男朋友一口，再点确定即可解除\n\n【愚人节快乐！】");
                
                if (tip) {
                    stopPrank();
                    return;
                }
                timer = setTimeout(prankAlert, 100);
            }
            
            window.onbeforeunload = function() {
                return "请勿关闭，正在核对欠款信息！";
            };
            
            prankAlert();
        }

        function stopPrank() {
            prankRunning = false;
            clearTimeout(timer);
            window.onbeforeunload = null;
            alert("✅ 亲男朋友成功！欠款已自动清零～");
        }
    </script>
</body>
</html>
