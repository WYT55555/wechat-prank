<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愚人节惊喜</title>
  <style>
    * {
      margin:0; padding:0; box-sizing:border-box;
      -webkit-user-select:none; user-select:none;
    }
    body {
      background: linear-gradient(135deg, #ff6b9d, #ff8fab, #ffb6c1);
      min-height:100vh; display:flex; justify-content:center; align-items:center;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }
    .container {
      background: rgba(255,255,255,0.98); border-radius:20px; padding:30px 25px;
      width:90%; max-width:400px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.2);
    }
    .title {
      font-size:24px; color:#ff4081; margin-bottom:15px;
    }
    .subtitle {
      font-size:16px; color:#666; margin-bottom:25px; line-height:1.5;
    }
    .options {
      display:flex; flex-direction:column; gap:12px;
    }
    .btn {
      padding:18px; border-radius:12px; font-size:17px; border:none; cursor:pointer;
    }
    .btn-wrong {
      background:#f8f9fa; color:#666; border:2px solid #e9ecef;
    }
    .btn-correct {
      background:linear-gradient(135deg, #ff4081, #ff6b9d); color:white;
    }
    .error {
      background:rgba(244,67,54,0.9); color:white; padding:12px; border-radius:10px;
      margin-top:15px; display:none;
    }
    .success {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:linear-gradient(135deg, #ff6b9d, #ff8fab, #ffb6c1);
      display:none; justify-content:center; align-items:center;
    }
    .success-box {
      background:white; border-radius:20px; padding:40px 30px; text-align:center;
    }
    .close-btn {
      background:linear-gradient(135deg, #4CAF50, #66BB6A); color:white;
      padding:16px 40px; border:none; border-radius:25px; margin-top:20px; cursor:pointer;
    }
  </style>
</head>
<body>

<!-- 主页面 -->
<div class="container" id="main">
  <div class="title">🎭 愚人节特别挑战 🎭</div>
  <div class="subtitle">
    亲爱的，你点开了这个链接！<br>
    现在你必须完成挑战才能退出...
  </div>
  <div class="options">
    <button class="btn btn-wrong" id="wrong1">❌ 点这里退出</button>
    <button class="btn btn-wrong" id="wrong2">❌ 拒绝挑战</button>
    <button class="btn btn-wrong" id="wrong3">❌ 我不是你宝贝</button>
    <button class="btn btn-correct" id="correct">💋 亲男朋友一口</button>
  </div>
  <div class="error" id="error">错误选择！请选择"亲男朋友一口"才能退出！</div>
</div>

<!-- 成功页面 -->
<div class="success" id="success">
  <div class="success-box">
    <h2>🎉 挑战成功！ 🎉</h2>
    <p>你选择了"亲男朋友一口"！<br>已经自动发送"我爱你"消息</p>
    <div id="love" style="font-size:24px; color:#ff4081; margin:20px 0;">我爱你 💕</div>
    <button class="close-btn" id="close">退出页面</button>
  </div>
</div>

<script>
// ==============================================
// 核心：只有选对才允许关闭，否则点×也会复活
// ==============================================
let ALLOW_CLOSE = false;
const PAGE_KEY = 'april_fool_allow_close';
const CURRENT_URL = window.location.href.split('#')[0];

// 本地存储标记：选对才放行
if (localStorage.getItem(PAGE_KEY) === '1') {
  ALLOW_CLOSE = true;
  localStorage.removeItem(PAGE_KEY);
}

// 页面关闭/刷新前拦截
window.addEventListener('beforeunload', (e) => {
  if (!ALLOW_CLOSE) {
    // 点关闭×时，标记下次自动复活
    localStorage.setItem(PAGE_KEY, '0');
    e.preventDefault();
    return '必须完成挑战才能离开哦～';
  }
});

// 微信返回键拦截（←）
history.pushState({}, '', CURRENT_URL);
window.addEventListener('popstate', () => {
  if (!ALLOW_CLOSE) {
    history.pushState({}, '', CURRENT_URL);
    showError("想跑？没门！必须亲我才能退出～");
  }
});

// 错误选项
document.getElementById('wrong1').onclick = () =>
  showError("想得美！不亲我是出不去的～");
document.getElementById('wrong2').onclick = () =>
  showError("拒绝无效！今天必须亲我～");
document.getElementById('wrong3').onclick = () =>
  showError("不承认也没用，你就是我宝贝！");

// 正确选项：放行
document.getElementById('correct').onclick = () => {
  ALLOW_CLOSE = true;
  localStorage.setItem(PAGE_KEY, '1'); // 标记允许关闭
  document.getElementById('main').style.display = 'none';
  document.getElementById('success').style.display = 'flex';
};

// 退出按钮（真正关闭）
document.getElementById('close').onclick = () => {
  if (confirm("愚人节快乐！确定关闭？")) {
    localStorage.removeItem(PAGE_KEY);
    // 微信关闭
    if (typeof WeixinJSBridge === 'object') {
      WeixinJSBridge.invoke('closeWindow', {}, () => {});
    } else {
      window.close();
    }
  }
};

// 复活机制：点×关闭后，重新打开页面
if (localStorage.getItem(PAGE_KEY) === '0' && !ALLOW_CLOSE) {
  localStorage.removeItem(PAGE_KEY);
  // 延迟100ms重开（避免死循环）
  setTimeout(() => {
    window.open(CURRENT_URL, '_self');
  }, 100);
}

// 显示错误提示
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2200);
}
</script>
</body>
</html>
