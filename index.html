<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愚人节惊喜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#ff9bbb;display:flex;align-items:center;justify-content:center;height:100vh;}
.main{background:#fff;padding:30px;border-radius:20px;text-align:center;width:85%;max-width:380px;}
.title{font-size:24px;color:#ff4080;margin-bottom:15px;}
.desc{color:#666;margin-bottom:25px;line-height:1.5;}
.btn{width:100%;padding:16px;border-radius:12px;border:0;margin-bottom:10px;font-size:16px;cursor:pointer;}
.wrong{background:#f2f2f2;color:#666;}
.right{background:#ff4080;color:white;}
.msg{background:#ff4444;color:white;padding:10px;border-radius:8px;margin-top:15px;display:none;}
.success{position:fixed;top:0;left:0;width:100%;height:100%;background:#ff9bbb;display:none;align-items:center;justify-content:center;}
.suc-box{background:#fff;padding:40px;border-radius:20px;text-align:center;}
</style>
</head>
<body>

<div class="main" id="main">
  <div class="title">🎭 愚人节挑战 🎭</div>
  <div class="desc">你必须完成挑战才能返回~</div>
  <button class="btn wrong" id="b1">❌ 点我退出</button>
  <button class="btn wrong" id="b2">❌ 拒绝挑战</button>
  <button class="btn wrong" id="b3">❌ 我才不亲</button>
  <button class="btn right" id="ok">💋 亲男朋友一口</button>
  <div class="msg" id="msg"></div>
</div>

<div class="success" id="success">
  <div class="suc-box">
    <h2 style="color:#ff4080">🎉 挑战成功 🎉</h2>
    <p style="margin:15px 0">已自动发送：我爱你 💕</p>
    <button onclick="exitPage()" style="background:#4caf50;color:white;padding:12px 30px;border:0;border-radius:30px;">退出页面</button>
  </div>
</div>

<script>
// ==============================================
// 核心：只劫持【返回箭头】，苹果/安卓都生效
// ==============================================
let canBack = false;

// 1. 先塞一条历史
history.pushState(null, null, location.href);

// 2. 监听返回，无限塞历史（鬼打墙）
window.addEventListener("popstate", function () {
  if (!canBack) {
    history.pushState(null, null, location.href);
    showMsg("哈哈哈，返回键已经被我锁住啦！");
  }
});

// 错误按钮
document.getElementById("b1").onclick = () => showMsg("别想跑！");
document.getElementById("b2").onclick = () => showMsg("拒绝无效！");
document.getElementById("b3").onclick = () => showMsg("你就是我的宝贝~");

// 正确按钮：解除返回劫持
document.getElementById("ok").onclick = () => {
  canBack = true;
  document.getElementById("main").style.display = "none";
  document.getElementById("success").style.display = "flex";
};

function showMsg(text) {
  const m = document.getElementById("msg");
  m.textContent = text;
  m.style.display = "block";
  setTimeout(() => m.style.display = "none", 1800);
}

function exitPage() {
  if (window.WeixinJSBridge) WeixinJSBridge.invoke("closeWindow");
  else window.close();
}
</script>
</body>
</html>
